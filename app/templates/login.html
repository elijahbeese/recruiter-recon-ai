<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITREP — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#f0f2f8;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#1a1d2e;border:1px solid #252840;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
.logo-icon{width:52px;height:52px;background:#6366f1;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:white;margin:0 auto 16px}
.logo-name{font-size:22px;font-weight:700;letter-spacing:3px;font-family:'Space Mono',monospace;color:#f0f2f8}
.logo-sub{font-size:11px;color:#4a5580;letter-spacing:1.5px;font-family:'Space Mono',monospace;margin-bottom:36px}
.form-group{margin-bottom:16px;text-align:left}
.form-label{font-size:12px;color:#8892b0;font-weight:600;margin-bottom:6px;display:block;letter-spacing:.3px}
.form-input{width:100%;background:#252840;border:1px solid #313458;border-radius:10px;padding:11px 14px;color:#f0f2f8;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#6366f1}
.btn{width:100%;background:#6366f1;color:white;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:opacity .15s}
.btn:hover{opacity:.85}
.error{background:#2d0a0a;border:1px solid #f87171;color:#f87171;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo-icon">S</div>
  <div class="logo-name">SITREP</div>
  <div class="logo-sub">JOB INTELLIGENCE PLATFORM</div>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" name="username" placeholder="Enter username" autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Enter password">
    </div>
    <button class="btn" type="submit">Sign In →</button>
  </form>
</div>
</body>
</html>
